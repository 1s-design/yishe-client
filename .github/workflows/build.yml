name: Build and Release Electron App

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - electron-builder.yml
      - src/main/externalProcessConfig.ts
      - scripts/download-latest-plugins.mjs
      - .github/workflows/build.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version_check.outputs.changed }}
      version: ${{ steps.version_check.outputs.version }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if package.json version changed
        id: version_check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const before = context.payload.before;
            const isAllZero = (sha) => typeof sha === 'string' && /^0+$/.test(sha);

            const currentPkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const currentVersion = currentPkg.version;

            let previousVersion = null;
            if (before && !isAllZero(before)) {
              try {
                const prevPkgText = execSync(`git show ${before}:package.json`, { encoding: 'utf8' });
                previousVersion = JSON.parse(prevPkgText).version ?? null;
              } catch (e) {
                core.warning(`无法读取上一个提交的 package.json：${e.message}`);
              }
            }

            const changed = previousVersion === null ? true : (previousVersion !== currentVersion);
            core.info(`previousVersion=${previousVersion ?? '(unknown)'}, currentVersion=${currentVersion}, changed=${changed}`);
            core.setOutput('changed', String(changed));
            core.setOutput('version', currentVersion);

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            build_args: --mac dmg --config electron-builder.yml
            csc_identity_auto_discovery: "true"
          - os: windows-latest
            build_args: --win portable --config electron-builder.yml
            csc_identity_auto_discovery: ""

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci || (echo "Retry 1..." && sleep 10 && npm ci) || (echo "Retry 2..." && sleep 10 && npm ci)

      - name: Clean managed plugins before build
        run: npm run clean:plugins

      - name: Download managed plugins for unified build
        run: npm run prepare:plugins

      - name: Build/Release Electron app
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.github_token }}
          release: true
          draft: false
          prerelease: false
          args: ${{ matrix.build_args }}
        env:
          GH_TOKEN: ${{ secrets.github_token }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.csc_identity_auto_discovery }}

  # electron-builder 仍会附带 latest*.yml、blockmap 等；仅保留固定文件名的两枚安装包，便于 https://github.com/.../releases/latest/download/ 稳定直链
  prune-release-assets:
    needs: [check-version, build]
    if: success() && needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Remove extra release assets
        uses: actions/github-script@v7
        with:
          script: |
            const keep = new Set([
              'yishe-client.exe',
              'yishe-client.dmg',
            ]);
            const tag = `v${{ needs.check-version.outputs.version }}`;

            let release;
            try {
              const res = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = res.data;
            } catch (e) {
              core.warning(`未找到 tag ${tag} 的 release，跳过修剪：${e.message}`);
              return;
            }

            const assets = release.assets || [];
            for (const asset of assets) {
              if (keep.has(asset.name)) continue;
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
              core.info(`已删除 release 附加文件: ${asset.name}`);
            }

  notify-feishu:
    needs: [check-version, build]
    if: always() && needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Feishu Notification
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.build.result }}';
            const emoji = status === 'success' ? '🚀' : '❌';
            const commitSha = '${{ github.sha }}'.substring(0, 7);

            const message = {
              msg_type: "text",
              content: {
                text: `${emoji} 衣设Electron应用构建${status === 'success' ? '成功' : '失败'}通知\n\n` +
                      `项目: ${{ github.repository }}\n` +
                      `分支: main\n` +
                      `提交: ${commitSha}\n` +
                      `矩阵: macOS + Windows（单条通知汇总）\n` +
                      `提交者: ${{ github.actor }}\n` +
                      `提交信息: ${{ github.event.head_commit.message }}\n` +
                      `构建时间: ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}\n` +
                      `状态: ${status === 'success' ? '✅ 成功' : '❌ 失败'}\n\n` +
                      `Windows 固定地址: https://github.com/${{ github.repository }}/releases/latest/download/yishe-client.exe\n` +
                      `macOS 固定地址: https://github.com/${{ github.repository }}/releases/latest/download/yishe-client.dmg\n` +
                      `统一说明: 当前仅提供一套客户端安装包，浏览器自动化已内置到客户端中。\n` +
                      `支持平台: 抖音、小红书、微博、快手、咸鱼、速卖通、亚马逊、希音\n` +
                      `注意: 仓库为私有，但 releases 可设置为公开访问`
              },
            };

            await fetch('${{ secrets.FEISHU_WEBHOOK_URL }}', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(message),
            });
