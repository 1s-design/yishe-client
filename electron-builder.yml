appId: com.yishe.electron
productName: yishe-client
directories:
  buildResources: build
  output: release
afterPack: ./scripts/after-pack-ad-hoc-sign.mjs
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!out/**/*"
  - "!out/video-template-source/**/*"
  - "!out/video-template-bundle/**/*"
  - "!resources/remotion-browser/**/*"
  - "!resources/google-art/**/*"
  - "!resources/plugin/**/*"
asarUnpack:
  - resources/**
  - node_modules/@remotion/**
  - generated/video-template-source/**
  - generated/video-template-bundle/**
extraResources:
  - from: resources/remotion
    to: resources/remotion
    filter:
      - "**/*"
generateUpdatesFilesForAllChannels: false
win:
  target:
    - portable
  icon: build/icon.ico
  executableName: yishe-client
  artifactName: yishe-client.${ext}
  extraResources:
    - from: resources/google-art/win32
      to: resources/google-art/win32
      filter:
        - dezoomify-rs-win.exe
    - from: resources/plugin/win32/image-tool
      to: resources/plugin/win32/image-tool
    - from: resources/plugin/win32
      to: resources/plugin/win32
      filter:
        - yishe-ps-windows.exe
nsis:
  differentialPackage: false
mac:
  category: public.app-category.utilities
  target:
    - dmg
  icon: build/icon.icns
  binaries:
    - resources/google-art/darwin/dezoomify-rs-mac
  artifactName: yishe-client.${ext}
  extraResources:
    - from: resources/google-art/darwin
      to: resources/google-art/darwin
      filter:
        - dezoomify-rs-mac
    - from: resources/plugin/darwin
      to: resources/plugin/darwin
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  title: yishe-client
  icon: build/icon.icns
  artifactName: yishe-client.${ext}
  writeUpdateInfo: false
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
    - target: snap
      arch:
        - x64
  category: Utility
  artifactName: yishe-client-${version}-${arch}.${ext}
  icon: resources/icon.png
  desktop:
    Name: Yishe Client
    Comment: 衣设客户端
    GenericName: Yishe Client
    Categories: Utility;
    Keywords: yishe;client;
npmRebuild: false
publish:
  provider: github
  releaseType: release
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
