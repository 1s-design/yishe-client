appId: com.yishe.electron
productName: 衣设客户端
directories:
  buildResources: build
  output: release
afterPack: ./scripts/after-pack-ad-hoc-sign.mjs
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - resources/**
generateUpdatesFilesForAllChannels: false
win:
  target:
    - portable
  icon: build/icon.ico
  executableName: yishe-client
  artifactName: yishe-client.${ext}
nsis:
  differentialPackage: false
mac:
  category: public.app-category.utilities
  target:
    - dmg
  icon: build/icon.icns
  binaries:
    - resources/plugin/dezoomify-rs-mac
  artifactName: yishe-client.${ext}
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  title: 衣设客户端
  icon: build/icon.icns
  artifactName: yishe-client.${ext}
  writeUpdateInfo: false
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
    - target: snap
      arch:
        - x64
  category: Utility
  artifactName: yishe-client-${version}-${arch}.${ext}
  icon: resources/icon.png
  desktop:
    Name: Yishe Client
    Comment: 衣设客户端
    GenericName: Yishe Client
    Categories: Utility;
    Keywords: yishe;client;
npmRebuild: false
publish:
  provider: github
  releaseType: release
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
